<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛要及食 — 品項分類管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', 'PingFang TC', system-ui, sans-serif;
    background: #f2f2ef;
    min-height: 100vh;
  }

  /* Top bar */
  #topbar {
    background: #1a1a1a;
    border-bottom: 1px solid #2e2e2e;
    height: 54px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 200;
    gap: 0;
  }
  #brand { margin-right: 32px; }
  #brand span { color: #fff; font-weight: 900; font-size: 15px; letter-spacing: 1px; }
  #brand small { color: #999; font-size: 12px; margin-left: 10px; }
  .tab-btn {
    background: transparent;
    color: #aaa;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0 16px;
    height: 54px;
    cursor: pointer;
    font-weight: 400;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #fff; font-weight: 700; }
  .tab-btn:hover:not(.active) { color: #ccc; }
  #spacer { flex: 1; }
  #export-btn {
    background: #fff;
    color: #111;
    border: none;
    border-radius: 7px;
    padding: 6px 16px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.25s;
  }
  #export-btn.done { background: #27ae60; color: #fff; }

  /* Content */
  #content { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }
  #section-header { margin-bottom: 20px; }
  #section-header h2 { font-size: 18px; font-weight: 800; color: #111; display: inline; }
  #section-header .desc { font-size: 12px; color: #888; margin-left: 12px; }
  #section-hint { margin-top: 6px; font-size: 11px; color: #bbb; }

  /* Grid */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  /* Category card */
  .cat-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e4e4e4;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    overflow: hidden;
    transition: box-shadow 0.15s, border 0.15s, opacity 0.15s;
  }
  .cat-card.drag-over { border: 2px dashed #999; }
  .cat-card.dragging { opacity: 0.4; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
    user-select: none;
  }
  .cat-header.collapsed { border-bottom: none; }
  .drag-handle {
    cursor: grab;
    color: #ccc;
    font-size: 15px;
    letter-spacing: -1px;
    padding: 0 2px;
  }
  .cat-name {
    flex: 1;
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    cursor: text;
    outline: none;
    border: none;
    background: transparent;
    font-family: inherit;
    padding: 0;
  }
  .cat-name:focus {
    outline: 1px solid #ddd;
    border-radius: 4px;
    padding: 1px 4px;
  }
  .cat-count { font-size: 11px; color: #bbb; }
  .icon-btn {
    background: transparent;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 4px;
    font-family: inherit;
  }
  .icon-btn.del { color: #c0392b; }

  .cat-body { padding: 10px 12px; }

  /* Item rows */
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: background 0.1s;
    cursor: default;
    user-select: none;
  }
  .item-row:nth-child(odd) { background: #fafafa; }
  .item-row:nth-child(even) { background: #fff; }
  .item-row.item-dragging { opacity: 0.4; background: #f0f0ff; }
  .item-row.item-over { background: #f0f7f0; border: 1px dashed #bbb; }
  .item-handle { font-size: 11px; color: #ccc; cursor: grab; padding: 0 2px; letter-spacing: -1px; }
  .item-label { flex: 1; font-size: 13px; color: #333; }
  .item-del {
    background: transparent;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 11px;
    padding: 0 2px;
  }
  .item-del:hover { color: #c0392b; }

  /* Add item row */
  .add-item-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-item-input {
    flex: 1;
    font-size: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 5px 8px;
    outline: none;
    color: #333;
    font-family: inherit;
  }
  .add-item-btn {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
  }

  /* Add category row */
  .add-cat-row { display: flex; gap: 8px; max-width: 340px; }
  .add-cat-input {
    flex: 1;
    font-size: 13px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
    color: #333;
    font-family: inherit;
  }
  .add-cat-btn {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
  }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <span>愛要及食</span>
    <small>品項分類管理</small>
  </div>
  <button class="tab-btn active" data-tab="hard">所有商品</button>
  <button class="tab-btn" data-tab="fresh">生鮮食材</button>
  <button class="tab-btn" data-tab="ready">即食調理</button>
  <button class="tab-btn" data-tab="soft">場合推薦</button>
  <div id="spacer"></div>
</div>

<div id="content">
  <div id="section-header">
    <h2 id="section-title">所有商品</h2>
    <span class="desc" id="section-desc">依食材本質劃分，用於篩選器與導覽選單</span>
    <div id="section-hint">長按左側 ⠿ 可拖曳排序分類 · 分類內品項同樣可長按拖曳 · 點擊分類名稱重新命名</div>
  </div>

  <div class="tab-panel active" id="panel-hard"></div>
  <div class="tab-panel" id="panel-fresh"></div>
  <div class="tab-panel" id="panel-ready"></div>
  <div class="tab-panel" id="panel-soft"></div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────

const DATA = {
  hard: {
    desc: "依食材本質劃分，用於篩選器與導覽選單",
    cats: [
      { id: "h1", name: "年菜 & 湯品", items: ["白鯧米粉", "佛跳牆", "海鮮羹", "湯匙魚翅高湯 1.5K"] },
      { id: "h2", name: "魚翅 & 排翅", items: ["鳳勾翅", "金勾翅", "300g 排翅（大）", "10/12 朵中排翅", "3 朵大排翅 A 級"] },
      { id: "h3", name: "海鮮類", items: ["生食干貝", "鮭魚菲力", "鮭魚切片", "鱸魚片", "16/20 白蝦（泰國）", "21/25 白蝦（泰國）", "鮮魷魚 150g", "金福氣魚蛋", "尤魚冰卷", "五味冰卷", "黃金咖哩魚塊", "黃金旗魚酥", "香蒜魷魚酥"] },
      { id: "h4", name: "豬肉類", items: ["鹹豬肉", "梅花豬肉", "黑金粹滷肉燥 400g", "桂花燒軟排", "蜜汁豬腳"] },
      { id: "h5", name: "禽類", items: ["去骨雞腿排 300g", "舒肥雞胸肉", "貴妃鴨掌 400g"] },
      { id: "h6", name: "點心 & 麵點", items: ["珍菇流沙包（芝麻）", "珍菇流沙包（奶皇）", "蜜蘋果牛奶"] },
      { id: "h7", name: "禮盒 & 包材", items: ["禮盒組（保麗龍＋手提袋）", "手提袋", "保麗龍", "保冰袋"] },
    ]
  },
  fresh: {
    desc: "需自行烹調的品項",
    cats: [
      { id: "f1", name: "生鮮海鮮", items: ["生食干貝", "鮭魚菲力", "鮭魚切片", "鱸魚片", "16/20 白蝦（泰國）", "21/25 白蝦（泰國）", "鮮魷魚 150g"] },
      { id: "f2", name: "生鮮肉類", items: ["梅花豬肉", "鹹豬肉", "去骨雞腿排 300g"] },
      { id: "f3", name: "魚翅 & 排翅", items: ["鳳勾翅", "金勾翅", "300g 排翅（大）", "10/12 朵中排翅", "3 朵大排翅 A 級"] },
    ]
  },
  ready: {
    desc: "解凍或加熱即可食用的品項",
    cats: [
      { id: "r1", name: "解凍即食", items: ["金福氣魚蛋", "尤魚冰卷", "五味冰卷", "貴妃鴨掌 400g"] },
      { id: "r2", name: "加熱即食", items: ["黃金咖哩魚塊", "黃金旗魚酥", "香蒜魷魚酥", "黑金粹滷肉燥 400g", "桂花燒軟排", "蜜汁豬腳", "舒肥雞胸肉"] },
      { id: "r3", name: "年菜 & 湯品", items: ["白鯧米粉", "佛跳牆", "海鮮羹", "湯匙魚翅高湯 1.5K"] },
      { id: "r4", name: "點心 & 麵點", items: ["珍菇流沙包（芝麻）", "珍菇流沙包（奶皇）", "蜜蘋果牛奶"] },
    ]
  },
  soft: {
    desc: "依使用情境劃分，用於首頁推薦與標籤搜尋",
    cats: [
      { id: "s1", name: "年節首選", items: ["白鯧米粉", "佛跳牆", "海鮮羹", "魚翅高湯", "禮盒組"] },
      { id: "s2", name: "送禮推薦", items: ["禮盒組", "貴妃鴨掌", "旗魚酥", "魚翅"] },
      { id: "s3", name: "解凍即食", items: ["金福氣魚蛋", "尤魚冰卷", "五味冰卷", "貴妃鴨掌"] },
      { id: "s4", name: "加熱即食", items: ["黃金咖哩魚塊", "黃金旗魚酥", "滷肉燥", "桂花燒軟排", "香蒜魷魚酥", "流沙包"] },
      { id: "s5", name: "宴客料理", items: ["佛跳牆", "海鮮羹", "魚翅", "干貝", "白蝦"] },
      { id: "s6", name: "健康輕食", items: ["舒肥雞胸肉", "去骨雞腿排", "鮭魚菲力"] },
      { id: "s7", name: "海鮮愛好者", items: ["干貝", "鮭魚", "白蝦", "魷魚", "魚蛋", "冰卷"] },
      { id: "s8", name: "囤貨好選擇", items: ["白蝦", "鮭魚切片", "鱸魚片", "滷肉燥"] },
      { id: "s9", name: "新品上市", items: ["香蒜魷魚酥", "舒肥雞胸肉"] },
      { id: "s10", name: "中秋烤肉歡樂組", items: ["梅花豬肉", "鹹豬肉", "去骨雞腿排", "16/20 白蝦（泰國）", "21/25 白蝦（泰國）", "鮮魷魚 150g", "生食干貝", "黃金旗魚酥", "香蒜魷魚酥"] },
    ]
  }
};

let _uid = 0;
const uid = () => `id_${Date.now()}_${_uid++}`;

// ─── State ────────────────────────────────────────────────────────────────────

const state = {
  hard:  JSON.parse(JSON.stringify(DATA.hard.cats)),
  fresh: JSON.parse(JSON.stringify(DATA.fresh.cats)),
  ready: JSON.parse(JSON.stringify(DATA.ready.cats)),
  soft:  JSON.parse(JSON.stringify(DATA.soft.cats)),
};

let currentTab = "hard";

// ─── Drag state ───────────────────────────────────────────────────────────────

let catDragIdx = null, catOverIdx = null, catPressTimer = null;
let itemDragCatId = null, itemDragIdx = null, itemOverIdx = null, itemPressTimer = null;

// ─── Render ───────────────────────────────────────────────────────────────────

function render(tabKey) {
  const panel = document.getElementById(`panel-${tabKey}`);
  const cats = state[tabKey];

  panel.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'cat-grid';

  cats.forEach((cat, catIdx) => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.catId = cat.id;
    card.dataset.catIdx = catIdx;

    // Header
    const header = document.createElement('div');
    header.className = 'cat-header';

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.title = '長按拖曳';

    // Long-press drag for category
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      catPressTimer = setTimeout(() => {
        catDragIdx = catIdx;
        card.classList.add('dragging');
      }, 400);
    });
    document.addEventListener('mouseup', () => {
      clearTimeout(catPressTimer);
      if (catDragIdx !== null) {
        // Do reorder
        if (catDragIdx !== catOverIdx && catOverIdx !== null) {
          const arr = state[tabKey];
          const [removed] = arr.splice(catDragIdx, 1);
          arr.splice(catOverIdx, 0, removed);
          render(tabKey);
        } else {
          document.querySelectorAll('.cat-card').forEach(c => {
            c.classList.remove('dragging', 'drag-over');
          });
        }
        catDragIdx = null; catOverIdx = null;
      }
    }, { once: false });

    card.addEventListener('mouseenter', () => {
      if (catDragIdx !== null && catDragIdx !== catIdx) {
        catOverIdx = catIdx;
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      }
    });

    const nameInput = document.createElement('input');
    nameInput.className = 'cat-name';
    nameInput.value = cat.name;
    nameInput.addEventListener('change', () => {
      cat.name = nameInput.value;
    });

    const count = document.createElement('span');
    count.className = 'cat-count';
    count.textContent = `${cat.items.length} 項`;

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'icon-btn';
    toggleBtn.textContent = '▲';

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del';
    delBtn.textContent = '✕';
    delBtn.title = '刪除分類';
    delBtn.addEventListener('click', () => {
      state[tabKey] = state[tabKey].filter(c => c.id !== cat.id);
      render(tabKey);
    });

    header.append(handle, nameInput, count, toggleBtn, delBtn);

    // Body
    const body = document.createElement('div');
    body.className = 'cat-body';

    let isOpen = true;
    toggleBtn.addEventListener('click', () => {
      isOpen = !isOpen;
      body.style.display = isOpen ? '' : 'none';
      header.classList.toggle('collapsed', !isOpen);
      toggleBtn.textContent = isOpen ? '▲' : '▼';
    });

    // Items
    const itemList = document.createElement('div');

    const renderItems = () => {
      itemList.innerHTML = '';
      count.textContent = `${cat.items.length} 項`;
      cat.items.forEach((item, itemIdx) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.dataset.itemIdx = itemIdx;

        const iHandle = document.createElement('span');
        iHandle.className = 'item-handle';
        iHandle.textContent = '⠿';

        // Long-press drag for items
        iHandle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          itemPressTimer = setTimeout(() => {
            itemDragCatId = cat.id;
            itemDragIdx = itemIdx;
            row.classList.add('item-dragging');
          }, 400);
        });

        row.addEventListener('mouseenter', () => {
          if (itemDragCatId === cat.id && itemDragIdx !== null && itemDragIdx !== itemIdx) {
            itemOverIdx = itemIdx;
            itemList.querySelectorAll('.item-row').forEach(r => r.classList.remove('item-over'));
            row.classList.add('item-over');
          }
        });

        const label = document.createElement('span');
        label.className = 'item-label';
        label.textContent = item;

        const delItem = document.createElement('button');
        delItem.className = 'item-del';
        delItem.textContent = '✕';
        delItem.addEventListener('mousedown', e => e.stopPropagation());
        delItem.addEventListener('click', () => {
          cat.items.splice(itemIdx, 1);
          renderItems();
        });

        row.append(iHandle, label, delItem);
        itemList.appendChild(row);
      });

      // Item drag drop
      itemList.addEventListener('mouseup', () => {
        clearTimeout(itemPressTimer);
        if (itemDragCatId === cat.id && itemDragIdx !== null && itemOverIdx !== null && itemDragIdx !== itemOverIdx) {
          const [removed] = cat.items.splice(itemDragIdx, 1);
          cat.items.splice(itemOverIdx, 0, removed);
        }
        itemDragCatId = null; itemDragIdx = null; itemOverIdx = null;
        renderItems();
      }, { once: true });
    };

    renderItems();

    // Add item
    const addRow = document.createElement('div');
    addRow.className = 'add-item-row';
    const addInput = document.createElement('input');
    addInput.className = 'add-item-input';
    addInput.placeholder = '新增品項...';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-item-btn';
    addBtn.textContent = '＋';

    const doAdd = () => {
      const v = addInput.value.trim();
      if (!v) return;
      cat.items.push(v);
      addInput.value = '';
      renderItems();
    };
    addBtn.addEventListener('click', doAdd);
    addInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

    addRow.append(addInput, addBtn);
    body.append(itemList, addRow);
    card.append(header, body);
    grid.appendChild(card);
  });

  // Add category row
  const addCatRow = document.createElement('div');
  addCatRow.className = 'add-cat-row';
  const addCatInput = document.createElement('input');
  addCatInput.className = 'add-cat-input';
  addCatInput.placeholder = '新增分類名稱...';
  const addCatBtn = document.createElement('button');
  addCatBtn.className = 'add-cat-btn';
  addCatBtn.textContent = '新增分類';

  const doAddCat = () => {
    const v = addCatInput.value.trim();
    if (!v) return;
    state[tabKey].push({ id: uid(), name: v, items: [] });
    addCatInput.value = '';
    render(tabKey);
  };
  addCatBtn.addEventListener('click', doAddCat);
  addCatInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAddCat(); });

  addCatRow.append(addCatInput, addCatBtn);
  panel.append(grid, addCatRow);
}

// ─── Tab switching ────────────────────────────────────────────────────────────

const tabMeta = {
  hard:  { title: "所有商品", desc: DATA.hard.desc },
  fresh: { title: "生鮮食材", desc: DATA.fresh.desc },
  ready: { title: "即食調理", desc: DATA.ready.desc },
  soft:  { title: "場合推薦", desc: DATA.soft.desc },
};

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    document.getElementById('section-title').textContent = tabMeta[tab].title;
    document.getElementById('section-desc').textContent = tabMeta[tab].desc;
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────

['hard', 'fresh', 'ready', 'soft'].forEach(tab => render(tab));
</script>
</body>
</html>
